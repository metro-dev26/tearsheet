# Tearsheet theme. This is the OFFICIALLY supported way to restyle a Streamlit
# app — it works identically locally and on Streamlit Community Cloud, and it
# won't break when Streamlit changes its internal HTML (hand-written CSS does).
# Palette: GitHub-dark base + a blue accent, so it reads as a deliberate,
# finished tool rather than the stock gray default.
[theme]
base = "dark"
primaryColor = "#4f8cff"            # accent: links, expander headers, focus
backgroundColor = "#0d1117"         # page
secondaryBackgroundColor = "#161b22" # cards, code blocks, metric tiles
textColor = "#e6edf3"
font = "sans serif"
