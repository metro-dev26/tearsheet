# Tearsheet theme — "equity research note" look. Light/paper, serif, editorial.
# This is the OFFICIALLY supported way to restyle Streamlit; it works identically
# locally and on Streamlit Community Cloud. The heavy lifting is in app.py's CSS,
# but these base colors make Streamlit's own chrome match the paper aesthetic.
[theme]
base = "light"
primaryColor = "#8a2b1e"             # oxblood accent (flags, links)
backgroundColor = "#f7f4ee"          # warm paper (matches app.py --paper)
secondaryBackgroundColor = "#efeadf" # matches app.py --paper2
textColor = "#1c1a17"                # warm near-black ink
font = "serif"
